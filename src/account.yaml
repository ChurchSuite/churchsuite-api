openapi: 3.0.0
info:
  version: 2.86.2
  title: Account Data
  description: >-
    Access account-level configuration data about account. The data available
    here will typically spread across multiple modules.
  termsOfService: https://churchsuite.com/terms-of-service/
  contact:
    email: support@churchsuite.com
servers:
  - url: https://api.churchsuite.com/v2
    description: Public API server
paths:
  /account:
    get:
      operationId: get_account
      summary: Get account details
      description: Retrieve the details about your account.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - profile.read
        - oauth_app:
            - full_access
        - oauth_app:
            - profile.read
      tags:
        - Profile
  /account/brands/default:
    get:
      operationId: get_default_brand
      summary: Get default brand
      description: >-
        Retrieve the default brand, used in places where a specific brand has
        not been selected.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Brand'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - account
        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Brands
  /account/brands/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the record to retrieve.
        required: true
        schema:
          type: integer
          format: int32
          example: 678
          minimum: 1
    get:
      operationId: get_brand
      summary: Get a brand
      description: Retrieve a single brand identified by ID.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Brand'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - brands.read
        - oauth_app:
            - full_access
        - oauth_app:
            - brands.read
      tags:
        - Brands
  /account/brands:
    get:
      operationId: list_brands
      summary: List brands
      description: Returns a list of brands, sorted alphabetically by name.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Brand'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - brands.read
        - oauth_app:
            - full_access
        - oauth_app:
            - brands.read
      tags:
        - Brands
  /account/info:
    get:
      operationId: get_account_info
      summary: Get a summary of public account details
      description: >-
        Retrieve a summary of the public details about your account, that
        excludes information like the personal contact details of your billing,
        account and data protection contacts.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Info'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - account
        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Profile
  /account/integrations/stripe/accounts:
    get:
      operationId: list_stripe_accounts
      summary: List Stripe integration accounts
      description: Returns a list of integrated Stripe accounts.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StripeAccount'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - oauth_app:
            - full_access
      tags:
        - Integrations
  /account/sites/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the record to retrieve.
        required: true
        schema:
          type: integer
          format: int32
          example: 678
          minimum: 1
    get:
      operationId: get_site
      summary: Get a site
      description: Retrieve a single site identified by ID.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Site'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - account
        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Sites
  /account/sites:
    get:
      operationId: list_sites
      summary: List sites
      description: Returns a list of sites, sorted by the order property.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - account
        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Sites
  /account/users/current:
    get:
      operationId: get_current_user
      summary: Get current user
      description: >-
        Retrieve a single user identified as the user currently making the API
        request.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - user
        - oauth_app:
            - full_access
        - oauth_app:
            - user
      tags:
        - Users
  /account/users/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the record to retrieve.
        required: true
        schema:
          type: integer
          format: int32
          example: 678
          minimum: 1
    get:
      operationId: get_user
      summary: Get a user
      description: Retrieve a single user identified by ID.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - users.read
        - oauth_app:
            - full_access
        - oauth_app:
            - users.read
      tags:
        - Users
  /account/users:
    get:
      operationId: list_users
      summary: List users
      description: Returns a list of users, sorted alphabetically by username.
      parameters:
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPerPage'
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                additionalProperties: false
                required:
                  - data
                  - pagination
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - users.read
        - oauth_app:
            - full_access
        - oauth_app:
            - users.read
      tags:
        - Users
  /account/user_groups:
    get:
      operationId: list_user_groups
      summary: List user groups
      description: Returns a list of user groups, sorted alphabetically by name.
      parameters:
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPerPage'
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserGroup'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                additionalProperties: false
                required:
                  - data
                  - pagination
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - usergroups.read
        - oauth_app:
            - full_access
        - oauth_app:
            - usergroups.read
      tags:
        - Users
components:
  parameters:
    PaginationPage:
      in: query
      name: page
      description: Page number of items to return
      schema:
        type: integer
        example: 2
        default: 1
        minimum: 1
    PaginationPerPage:
      in: query
      name: per_page
      description: Number of items to return per request
      schema:
        type: integer
        example: 10
        default: 50
        maximum: 250
        minimum: 1
  schemas:
    Account:
      type: object
      properties:
        name:
          description: The name of your Account.
          type: string
          example: Kings Hope Church
        uuid:
          description: The Account's unique identifier.
          type: string
          format: uuid
          example: f1bacf7c-6e18-41f4-b94a-4a93887d6db4
        timezone:
          description: >-
            The Account timezone, in [IANA Time Zone
            Database](http://www.iana.org/time-zones) format.
          type: string
          example: Europe/London
        currency:
          description: The Account currency.
          type: string
          format: iso-4217
          example: GBP
        language:
          description: The Account language.
          type: string
          format: IETF BCP47
          example: en_GB
        give2_keyword:
          description: >-
            The give2 reference for your Account, only available in UK and North
            America
          type: string
          example: KingsHope
          nullable: true
        first_day_of_week:
          description: The start of the week for your Account.
          type: string
          example: Sunday
        data_protection_title:
          description: The title for the data protection notice for your Account.
          type: string
          example: Kings Hope Privacy policy
        data_protection_body:
          description: The Account's html data protection statement.
          type: string
          example: '<span style="color: #a7509f;">helloworld</span>'
        data_protection_help:
          description: The helper text that sits alongside the "I accept..." checkbox.
          type: string
          example: >-
            It is important that you read our privacy policy, to understand how
            your personal data is used.
        email_open_tracking:
          description: Tracks whether an email is opened or not.
          type: boolean
          example: true
        enforce_mfa:
          description: Whether to enforce multi-factor authentication to all users.
          type: boolean
          example: true
        billing_address:
          $ref: '#/components/schemas/Site/properties/address'
        billing_region:
          description: The region for the billing of your Account.
          type: string
          example: Washington
        billing_contact:
          type: object
          additionalProperties: false
          properties:
            name:
              description: The Contact's full name.
              type: string
              example: Esther Louise Daniels
            telephone:
              description: The Contact's telephone.
              type: string
              example: '01154960565'
            email:
              description: The Contact's email.
              type: string
              example: estherdaniels23@kingshopechurch.com
          required:
            - name
            - telephone
            - email
        data_protection_contact:
          $ref: '#/components/schemas/Account/properties/billing_contact'
        account_contact:
          $ref: '#/components/schemas/Account/properties/billing_contact'
        application:
          description: Whether the Account is a ChurchSuite or CharitySuite account.
          type: string
          example: charitysuite
          enum:
            - charitysuite
            - churchsuite
        subdomain:
          description: The subdomain of your Account.
          type: string
          example: kingshope
        feature_flags:
          description: A list of feature flags enabled for the Account.
          type: array
          items:
            type: string
            description: A single feature flag that is enabled for the Account.
            example: new-feature-flag
          example:
            - feature-flag-1
            - feature-flag-2
        created_at:
          description: Date and time the Account was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created the Account.
          type: string
          example: neil
          nullable: true
        modified_at:
          description: Date and time the Account details was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified the Account details.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - name
        - uuid
        - timezone
        - currency
        - language
        - give2_keyword
        - first_day_of_week
        - data_protection_title
        - data_protection_body
        - data_protection_help
        - email_open_tracking
        - enforce_mfa
        - billing_address
        - billing_region
        - billing_contact
        - data_protection_contact
        - account_contact
        - application
        - subdomain
        - feature_flags
        - created_at
        - created_by
        - modified_at
        - modified_by
    Brand:
      description: An account Brand
      type: object
      properties:
        id:
          description: The Brand's ID.
          type: integer
          example: 12
          minimum: 1
        name:
          description: The name of the Brand.
          type: string
          example: General Kings Hope Church.
        default:
          description: Whether this is the account's default Brand or not.
          type: boolean
          example: true
        emblem:
          description: A Brand Emblem, to use as a square avatar or icon
          type: object
          additionalProperties: false
          nullable: true
          properties:
            px_16:
              description: The emblem url for a 16x16px image.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/emblem_bWxJxu_16.png
            px_32:
              description: The Emblem url for a 32x32px image.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/emblem_bWxJxu_32.png
            px_64:
              description: The Emblem url for a 64x64px image.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/emblem_bWxJxu_64.png
            px_128:
              description: The Emblem url for a 128x128px image.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/emblem_bWxJxu_128.png
            px_152:
              description: The Emblem url for a 152x152px image.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/emblem_bWxJxu_152.png
            px_200:
              description: The Emblem url for a 200x200px image.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/emblem_bWxJxu_200.png
            uploaded_at:
              description: Date and time the Emblem was uploaded at.
              type: string
              format: date-time
              example: '2014-04-25T10:10:32Z'
          required:
            - px_16
            - px_32
            - px_64
            - px_128
            - px_152
            - px_200
            - uploaded_at
        logo:
          description: The Logo associated with a brand.
          type: object
          additionalProperties: false
          nullable: true
          properties:
            height:
              description: The height of the Logo in pixels.
              type: integer
              example: 200
            width:
              description: The width of the Logo in pixels.
              type: integer
              example: 1000
            url:
              description: The url for the Logo.
              type: string
              format: url
              example: https://cdn.churchsuite.com/2mCEi8cf/brand/logo_IgBBdl.png
            uploaded_at:
              description: Date and time the Logo was uploaded at.
              type: string
              format: date-time
              example: '2014-04-25T10:10:32Z'
          required:
            - width
            - height
            - url
            - uploaded_at
        colour:
          description: Deprecated, do not use - The Brand's hexadecimal colour value.
          type: string
          example: '#ab12cd'
        color:
          description: The Brand's hexadecimal colour value.
          type: string
          example: '#ab12cd'
        email_font:
          description: The Brand's font for emails.
          type: string
          example: Helvetica
          default: Open Sans
          enum:
            - Andale Mono
            - Arial Black
            - Arial
            - Book Antiqua
            - Courier New
            - Georgia
            - Helvetica
            - Montserrat
            - Open Sans
            - Roboto
            - Tahoma
            - Terminal
            - Times New Roman
            - Trebuchet MS
            - Verdana
        email_footer:
          description: The Brand's html for email footers.
          type: string
          example: >-
            <span style="color: #4697c9; font-size: 8pt;"><a style="color:
            #4697c9;" href="https://kingshope.churchsuite" target="_blank"
            rel="noopener">Kings Hope Church</a>&dagger;Easter
            Park&dagger;Lenton Lane&dagger;Nottingham&dagger;NG7 2PX</span>
        created_at:
          description: Date and time the Brand was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created the Brand.
          type: string
          example: neil
          nullable: true
        modified_at:
          description: Date and time the Brand was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified the Brand.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - default
        - emblem
        - logo
        - color
        - email_font
        - email_footer
        - created_at
        - created_by
        - modified_at
        - modified_by
    Info:
      type: object
      properties:
        name:
          description: The name of your Account.
          type: string
          example: Kings Hope Church
        uuid:
          description: The Account's unique identifier.
          type: string
          format: uuid
          example: f1bacf7c-6e18-41f4-b94a-4a93887d6db4
        timezone:
          description: >-
            The Account timezone, in [IANA Time Zone
            Database](http://www.iana.org/time-zones) format.
          type: string
          example: Europe/London
        currency:
          description: The Account currency.
          type: string
          format: iso-4217
          example: GBP
        language:
          description: The Account language.
          type: string
          format: IETF BCP47
          example: en_GB
        first_day_of_week:
          description: The start of the week for your Account.
          type: string
          example: Sunday
        application:
          description: Whether the Account is a ChurchSuite or CharitySuite account.
          type: string
          example: charitysuite
          enum:
            - charitysuite
            - churchsuite
        subdomain:
          description: The subdomain of your Account.
          type: string
          example: kingshope
        feature_flags:
          description: A list of feature flags enabled for the Account.
          type: array
          items:
            type: string
            description: A single feature flag that is enabled for the Account.
            example: new-feature-flag
          example:
            - feature-flag-1
            - feature-flag-2
      additionalProperties: false
      required:
        - name
        - uuid
        - timezone
        - currency
        - language
        - first_day_of_week
        - application
        - subdomain
        - feature_flags
    Pagination:
      type: object
      properties:
        num_results:
          description: The total number of results available
          type: integer
          format: int32
          minimum: 0
        per_page:
          description: The requested number of results per page
          type: integer
          format: int32
          minimum: 1
        page:
          description: The current page of results
          type: integer
          format: int32
          minimum: 1
        next_page:
          description: The page number of the next page of results, if there is one
          type: integer
          format: int32
          minimum: 1
          nullable: true
        prev_page:
          description: The page number of the previous page of results, if there is one
          type: integer
          format: int32
          minimum: 1
          nullable: true
      additionalProperties: false
      required:
        - num_results
        - per_page
        - page
        - next_page
        - prev_page
    Site:
      description: Organisations Site data
      type: object
      properties:
        id:
          description: The ID of the Site.
          type: integer
          example: 1
        name:
          description: The name of the Site.
          type: string
          example: Nottingham
        initials:
          description: The initials of the Site.
          type: string
          example: NOT
        color:
          description: The hex colour value of the Site.
          type: string
          example: '#ff4c67'
        order:
          description: The Sites order of precedence.
          type: integer
          example: 1
        address:
          description: A street Address.
          type: object
          additionalProperties: false
          nullable: true
          properties:
            line_1:
              description: The first line of the Address
              type: string
              example: Floor 2
            line_2:
              description: The second line of the Address
              type: string
              example: 1 Broadway
            line_3:
              description: The third line of the Address
              type: string
              example: Lace Market
              nullable: true
            city:
              description: The city of the Address
              type: string
              example: Nottingham
            county:
              description: The county of the Address
              type: string
              example: Nottinghamshire
            country:
              description: The country of the Address, in ISO3166 alpha 2 format
              type: string
              example: GB
              maxLength: 2
              minLength: 2
              nullable: true
            postcode:
              description: The postcode of the Address
              type: string
              example: NG1 1PR
            latitude:
              description: The latitude of the Address, to 6 decimal places
              type: number
              format: float
              example: 52.952089
              nullable: true
            longitude:
              description: The longitude of the Address, to 6 decimal places
              type: number
              format: float
              example: -1.1448
              nullable: true
          required:
            - line_1
            - line_2
            - line_3
            - city
            - county
            - country
            - postcode
            - latitude
            - longitude
        created_at:
          description: Date and time the Site was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user that created the Site.
          type: string
          example: neil
          nullable: true
        modified_at:
          description: Date and time the Site was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user that last modified the Site.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - initials
        - color
        - order
        - address
        - created_at
        - created_by
        - modified_at
        - modified_by
    StripeAccount:
      description: A single Stripe account, from the Stripe integration
      type: object
      properties:
        id:
          description: The ChurchSuite ID for the Stripe account.
          type: integer
          example: 1
        name:
          description: The name of the Stripe account.
          type: string
          example: The Kings Hope Current Account
        publishable_key:
          description: The publishable key of the Stripe account.
          type: string
          example: pk_test_qblFNYngBkEdjEZ16jxxoWSM
        default:
          description: Whether this is the default Stripe account or not.
          type: boolean
          example: true
        payment_methods:
          description: List of payment methods for the Stripe account.
          type: array
          items:
            type: string
            enum:
              - bancontact
              - card
              - eps
              - giropay
              - ideal
              - p24
              - sepa_debit
              - sofort
          example:
            - card
            - ideal
        fund_ids:
          description: >-
            Fund IDs this Stripe account is responsible for handling donations
            to, or null if the Giving module is not installed on your account.
          type: array
          items:
            type: integer
          example:
            - 1
            - 4
            - 8
          nullable: true
        type_ids:
          description: >-
            Booking type IDs this Stripe account is responsible for handling
            charges for, or null if the Bookings module is not installed on your
            account.
          type: array
          items:
            type: integer
          example:
            - 3
          nullable: true
        category_ids:
          description: >-
            Category IDs this Stripe account is responsible for handling sign-up
            transactions for, or null if the Calendar module is not installed on
            your account.
          type: array
          items:
            type: integer
          example:
            - 10
            - 15
          nullable: true
        modified_at:
          description: Date and time the Stripe account was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified the Stripe account.
          type: string
          example: helen
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - publishable_key
        - default
        - payment_methods
        - fund_ids
        - type_ids
        - category_ids
        - modified_at
        - modified_by
    User:
      type: object
      properties:
        id:
          description: The User's ID.
          type: integer
          example: 12
          minimum: 1
        username:
          description: The User's username.
          type: string
          example: jenny
        contact_id:
          description: The User's Contact ID if the User is linked to a Contact.
          type: integer
          example: 6
          nullable: true
        name:
          description: The name of the User.
          type: string
          example: Jenny
        email:
          description: The User's email address.
          type: string
          format: email
          example: jenny@kingshope.com
        logins:
          description: The number of times the User has logged in.
          type: integer
          example: 678
          minimum: 0
        last_login:
          description: Date and time the User last logged in.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        user_type:
          description: >-
            The permission type of the User, admins have full access, User
            permissions can be managed.
          type: string
          example: admin
          enum:
            - admin
            - user
        ical_url:
          description: The url for the User's ical feed.
          type: string
          format: uri
          example: >-
            https://examplechurch.churchsuite.com/ical/jenny-pnnnx6o6gdzdgyzp0hl4.ics
        image:
          description: A collection of different sized variations of an Image.
          type: object
          additionalProperties: false
          nullable: true
          properties:
            thumbnail:
              description: The thumbnail Image url. Thumbnail images are 128x128px.
              type: string
              format: url
              example: >-
                https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_thumb.jpg
            small:
              description: The small resolution Image url
              type: string
              format: url
              example: https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_sm.jpg
            medium:
              description: The medium resolution Image url
              type: string
              format: url
              example: https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_md.jpg
            large:
              description: The large resolution Image url
              type: string
              format: url
              example: https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_lg.jpg
            uploaded_at:
              description: Date and time the Image was uploaded at.
              type: string
              format: date-time
              example: '2014-04-25T10:10:32Z'
              nullable: true
          required:
            - thumbnail
            - small
            - medium
            - large
            - uploaded_at
        all_sites:
          description: Whether the User belongs to all sites or not.
          type: boolean
          example: false
        site_ids:
          description: List of all site IDs the User belongs to.
          type: array
          items:
            type: integer
          example:
            - 1
            - 5
            - 10
        mfa_enabled:
          description: Whether or not the User has multi factor authentication enabled.
          type: boolean
          example: true
        email_signature:
          description: The User's email signature.
          type: string
          example: '<h2><span style="font-size: 14pt;">Jenny Cooper</span></h2>'
        status:
          description: Current status of the User.
          type: string
          example: active
          enum:
            - active
            - archived
        created_at:
          description: Date and time the User was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created this User.
          type: string
          example: neil
          nullable: true
        modified_at:
          description: Date and time the User was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified this User.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - username
        - contact_id
        - name
        - email
        - logins
        - last_login
        - user_type
        - ical_url
        - image
        - all_sites
        - site_ids
        - mfa_enabled
        - email_signature
        - status
        - created_at
        - created_by
        - modified_at
        - modified_by
