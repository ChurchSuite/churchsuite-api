  responses:
    '400':
      description: Invalid request.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 400
                  errors:
                    type: object
                    example:
                      first_name: This field is required.
                      ticket_id: This ticket_id is invalid for this event.
                    additionalProperties:
                      oneOf:
                        - type: string
                        - type: object
                          additionalProperties:
                            type: string
                  message:
                    type: string
                    example: There were validation errors with the data you provided.
                required:
                  - status
                  - errors
                  - message
            additionalProperties: false
            required:
              - error
    '401':
      description: >-
        Unauthorized - the credentials provided are incorrect or no longer
        active.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 401
                  message:
                    type: string
                    example: Unauthorized
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '403':
      description: Forbidden - you do not have permission to access this resource.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 403
                  message:
                    type: string
                    example: You do not have sufficient permissions for this action
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '404':
      description: Not Found - the resource or API endpoint cannot be found.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 404
                  message:
                    type: string
                    example: Not Found
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '429':
      description: Too Many Requests - the rate limit has been exceeded.
      headers:
        Retry-After:
          description: Number of seconds until the rate limiting period expires
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 429
                  message:
                    type: string
                    example: The rate limit has been exceeded.
                    enum:
                      - The rate limit has been exceeded.
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
  securitySchemes:
    api_enabled_user:
      type: oauth2
      description: >-
        Access APIv2 using the OAuth2 Client Credentials grant flow by enabling
        API access for a user.
      flows:
        clientCredentials:
          tokenUrl: https://login.churchsuite.com/oauth2/token
          scopes:
            full_access: Full access on behalf of the API-enabled user
            account: >-
              Read access to the default brand, sites, and non-sensitive account
              details
            brands.read: Read access to all brands in the account
            profile.read: Read access to the full account profile
            user: Read access to the current user profile
            usergroups.read: Read access to all user groups in the account
            users.read: Read access to all users in the account
    oauth_app:
      type: oauth2
      description: >-
        Access APIv2 using the OAuth2 Authorization Code grant flow by creating
        an OAuth App.
      flows:
        authorizationCode:
          authorizationUrl: https://login.churchsuite.com/oauth2/authorize
          tokenUrl: https://login.churchsuite.com/oauth2/token
          scopes:
            full_access: Full access on behalf of the user who logs in using the OAuth App
            account: >-
              Read access to the default brand, sites, and non-sensitive account
              details
            brands.read: Read access to all brands in the account
            profile.read: Read access to the full account profile
            user: Read access to the current user profile
            usergroups.read: Read access to all user groups in the account
            users.read: Read access to all users in the account
tags:
  - name: Brands
    description: Brands allow you to control styling in different parts of your account.
  - name: Integrations
    description: >-
      Integrations allow you to access additional functionality provided by
      third-party services.
  - name: Profile
    description: >-
      Access details about your account, e.g. name, address, points of contact,
      etc.
  - name: Sites
    description: >-
      For organisations that span multiple physical locations, sites can be used
      to partition your account.
  - name: Users
    description: Manage who has access to view or modify data within your account.
