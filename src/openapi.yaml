        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - giving.read
        - oauth_app:
            - full_access
        - oauth_app:
            - giving.read
      tags:
        - Donations
