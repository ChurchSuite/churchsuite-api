                    maxLength: 100
                required:
                  - id
                  - field_type
                  - value
                additionalProperties: false
              - type: object
                title: UUID Field
                description: A Custom Field for this resource
                properties:
                  id:
                    description: The ID of the Custom Field
                    type: integer
                    example: 1
                    minimum: 1
                  field_type:
                    description: >-
                      A discriminator to determine the type of Custom Field this
                      response belongs to.
                    type: string
                    example: radio
                    enum:
                      - radio
                      - select
                  value:
                    description: >-
                      The UUID of the selected response for a radio or select
                      field.
                    type: object
                    example:
                      id: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                    additionalProperties: false
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: The UUID
                        example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                        minLength: 36
                        maxLength: 36
                    required:
                      - id
                required:
                  - id
                  - field_type
                  - value
                additionalProperties: false
              - type: object
                title: UUID List Field
                description: A Custom Field for this resource
                properties:
                  id:
                    description: The ID of the Custom Field
                    type: integer
                    example: 1
                    minimum: 1
                  field_type:
                    description: >-
                      A discriminator to determine the type of Custom Field this
                      response belongs to.
                    type: string
                    example: checkbox
                    enum:
                      - checkbox
                  value:
                    description: >-
                      A list of UUIDs of the selected responses for a checkbox
                      field.
                    type: array
                    items:
                      type: object
                      description: The UUID of the selected response for a checkbox field.
                      example:
                        id: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                      properties:
                        id:
                          description: The UUID
                          type: string
                          format: uuid
                          example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                          maxLength: 36
                          minLength: 36
                      required:
                        - id
                      additionalProperties: false
                required:
                  - id
                  - field_type
                  - value
                additionalProperties: false
            discriminator:
              propertyName: field_type
        communication:
          description: >-
            The person's communication preferences. If no data is provided, the
