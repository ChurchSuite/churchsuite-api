    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/628-booking-prices
  - name: Resources
    description: >-
      Define a list of the rooms and other resources that can be allocated to a
      booking.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
