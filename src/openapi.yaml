          nullable: true
        modified_by:
          description: The user who last modified the Organisation.
          type: string
          example: charis
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - reference
        - charity_number
        - email
        - meeting_address
        - office_address
        - telephone
        - custom_fields
        - links
        - embed
        - all_sites
