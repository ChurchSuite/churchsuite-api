  responses:
    '400':
      description: Invalid request.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 400
                  errors:
                    type: object
                    example:
                      first_name: This field is required.
                      ticket_id: This ticket_id is invalid for this event.
                    additionalProperties:
                      oneOf:
                        - type: string
                        - type: object
                          additionalProperties:
                            type: string
                  message:
                    type: string
                    example: There were validation errors with the data you provided.
                required:
                  - status
                  - errors
                  - message
            additionalProperties: false
            required:
              - error
    '401':
      description: >-
        Unauthorized - the credentials provided are incorrect or no longer
        active.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 401
                  message:
                    type: string
                    example: Unauthorized
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '403':
      description: Forbidden - you do not have permission to access this resource.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 403
                  message:
                    type: string
                    example: You do not have sufficient permissions for this action
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '404':
      description: Not Found - the resource or API endpoint cannot be found.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 404
                  message:
                    type: string
                    example: Not Found
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '409':
      description: Conflict.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 409
                  errors:
                    type: object
                    example:
                      name: >-
                        A category with this name already exists. Please choose
                        a different name.
                    additionalProperties:
                      type: string
                  message:
                    type: string
                    example: >-
                      A conflict exists that prevents your request from being
                      completed.
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
    '429':
      description: Too Many Requests - the rate limit has been exceeded.
      headers:
        Retry-After:
          description: Number of seconds until the rate limiting period expires
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: integer
                    enum:
                      - 429
                  message:
                    type: string
                    example: The rate limit has been exceeded.
                    enum:
                      - The rate limit has been exceeded.
                required:
                  - status
                  - message
            additionalProperties: false
            required:
              - error
  securitySchemes:
    api_enabled_user:
      type: oauth2
      description: >-
        Access APIv2 using the OAuth2 Client Credentials grant flow by enabling
        API access for a user.
      flows:
        clientCredentials:
          tokenUrl: https://login.churchsuite.com/oauth2/token
          scopes:
            full_access: Full access on behalf of the API-enabled user
            account: >-
              Read access to the default brand, sites, and non-sensitive account
              details
            brands.read: Read access to all brands in the account
            profile.read: Read access to the full account profile
            user: Read access to the current user profile
            usergroups.read: Read access to all user groups in the account
            users.read: Read access to all users in the account
    oauth_app:
      type: oauth2
      description: >-
        Access APIv2 using the OAuth2 Authorization Code grant flow by creating
        an OAuth App.
      flows:
        authorizationCode:
          authorizationUrl: https://login.churchsuite.com/oauth2/authorize
          tokenUrl: https://login.churchsuite.com/oauth2/token
          scopes:
            full_access: Full access on behalf of the user who logs in using the OAuth App
            account: >-
              Read access to the default brand, sites, and non-sensitive account
              details
            brands.read: Read access to all brands in the account
            profile.read: Read access to the full account profile
            user: Read access to the current user profile
            usergroups.read: Read access to all user groups in the account
            users.read: Read access to all users in the account
tags:
  - name: Brands
    description: Brands allow you to control styling in different parts of your account.
  - name: Integrations
    description: >-
      Integrations allow you to access additional functionality provided by
      third-party services.
  - name: Profile
    description: >-
      Access details about your account, e.g. name, address, points of contact,
      etc.
  - name: Sites
    description: >-
      For organisations that span multiple physical locations, sites can be used
      to partition your account.
  - name: Users
    description: Manage who has access to view or modify data within your account.
  - name: Contacts
    description: >-
      Contacts are the adults associated with your organisation. Contacts can be
      linked to children through a parent/carer relationship, as well as being
      added as members of groups, rotas/rosters, etc. The contact object is one
      of the primary objects within the overall ecosystem.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/29-adding-a-new-contact-to-your-address-book
  - name: Custom Fields
    description: >-
      Custom Fields collect and manage information that doesn't fit in the
      module's standard or optional fields.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/39-creating-custom-fields
  - name: Flows
    description: >-
      Flows are an incredibly versatile tool designed to streamline repetitive
      people-processing tasks by breaking them down into manageable stages. For
      each stage, you define the choice of preset actions to be processed as
      each person becomes due.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/154-flows
  - name: Form Fields
    description: Form Fields are the building blocks used to construct Forms
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/589-forms
  - name: Form Responses
    description: Form Responses are the responses of completed online forms.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/600-managing-form-responses
  - name: Key Dates
    description: >-
      Key Dates are people's date-based milestones that you want to record and
      track over time. Common examples include "First visit", "Became a member",
      "Attended leadership training", etc. Typically, Key Dates are recommended
      over the use of a date-type custom field.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/31-stay-on-top-of-your-church-member-key-dates
  - name: Tags
    description: Tags allow you to flexibly categorise or group people together.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/33-communicate-with-groups-of-contacts-in-a-fixed-tag
  - name: Gatherings
    description: Add each gathering you want to record attendance for.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/653-adding-and-managing-gatherings-for-attendance
  - name: Metricsets
    description: A metricset is the structure under which metrics can be assigned.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/653-adding-and-managing-gatherings-for-attendance#addmetricsets
  - name: Metrics
    description: >-
      Metrics allow you to record number/currency values for the individual
      metrics you wish to track.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/653-adding-and-managing-attendance-gatherings#addmetricsets
  - name: Records
    description: >-
      A record is the structure used to record attendance for a gathering on a
      given date.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/285-how-to-use-the-attendance-module
  - name: Bookings
    description: Manage room and resource bookings for your organisation.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/121-adding-and-viewing-bookings
  - name: Charges
    description: Charges can be raised against a booking for hire or maintenance fees.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: https://support.churchsuite.com/article/426-booking-charges
  - name: Customers
