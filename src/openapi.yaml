    CustomField:
      description: A Custom Field, as found in several modules
      type: object
      properties:
        id:
          description: The ID of the Custom Field.
          type: integer
          example: 1
        order:
          description: Order the Custom Field appears.
          type: integer
          example: 1
        type:
          description: The Custom Field type.
          type: string
          example: text
          enum:
            - text
            - textarea
            - checkbox
            - radio
            - select
            - date
            - email
            - phone
        name:
          description: Name of the Custom Field.
          type: string
          example: Receive weekly newsletter
        help:
          description: Some text to help explain the purpose of the field.
          type: string
          example: Tick if you would like to receive the weekly newsletter or not.
          nullable: true
        options:
          description: >-
            Field types checkbox, radio or select - will contain options for the
            field
          type: array
          items:
            type: object
            properties:
              id:
                description: UUID of the option.
                type: string
                format: uuid
                example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
              name:
                description: Name of the option.
                type: string
                example: Yes I would love to receive the newsletter!
              status:
                description: Status of the option.
                type: string
                example: active
                enum:
                  - active
                  - archived
            required:
              - id
              - name
              - status
            additionalProperties: false
          nullable: true
        required:
          description: Whether the field is required or not.
          type: boolean
          example: true
        settings:
          description: Settings relating to My, Embed and Connect.
          type: object
          nullable: true
          properties:
            my:
              description: My ChurchSuite and My Consent settings.
              type: object
              additionalProperties: false
              properties:
                editable:
                  description: Whether the field is editable in My.
                  type: boolean
                  example: false
                viewable:
                  description: Whether the field is viewable in My.
                  type: boolean
                  example: true
                required:
                  description: Whether the field is a required in My.
                  type: boolean
                  example: false
              required:
                - editable
                - viewable
                - required
            embed:
              description: Embed settings.
              type: object
              additionalProperties: false
              properties:
                editable:
                  description: Whether the field is editable in Embed.
                  type: boolean
                  example: false
                viewable:
                  description: Whether the field is viewable in Embed.
                  type: boolean
                  example: true
                required:
                  description: Whether the field is required in Embed.
                  type: boolean
                  example: false
              required:
                - editable
                - viewable
                - required
            connect:
              description: Connect settings.
              type: object
              additionalProperties: false
              properties:
                editable:
                  description: Whether the field is editable in Connect.
                  type: boolean
                  example: false
                viewable:
                  description: Whether the field is viewable in Connect.
                  type: boolean
                  example: true
                required:
                  description: Whether the field is required in Connect.
                  type: boolean
                  example: false
              required:
                - editable
                - viewable
                - required
        created_at:
          description: Date and time the Custom Field was created.
          type: string
          format: date-time
          example: '2022-11-17T16:48:13Z'
          nullable: true
        created_by:
          description: The user who created the Custom Field.
          type: string
          example: import
          nullable: true
        modified_at:
          description: Date and time the Custom Field was last modified.
          type: string
          format: date-time
          example: '2022-11-17T16:48:13Z'
          nullable: true
        modified_by:
          description: The user who last modified the Custom Field.
          type: string
          example: import
          nullable: true
      additionalProperties: false
      required:
        - id
        - order
        - type
        - name
        - help
        - options
        - required
        - settings
        - created_at
        - created_by
        - modified_at
        - modified_by
    Flow:
      description: Flow data, as found in several modules.
      type: object
      properties:
        id:
          description: The Flow's ID.
          type: integer
          example: 1
          minimum: 1
        name:
          description: The Flow's name.
          type: string
          example: Welcome new member
        notification_days:
          description: >-
            The days of the week where the Flow's managers receive emails when
            actions in this Flow are due/overdue, or null if no notification
            days are set.
          type: array
          items:
            type: string
            enum:
              - Monday
              - Tuesday
              - Wednesday
              - Thursday
              - Friday
              - Saturday
              - Sunday
          example:
            - Monday
            - Friday
            - Sunday
          nullable: true
        visible_in:
          description: Modules the resource is visible in.
          type: array
          items:
            type: string
            enum:
              - addressbook
              - bookings
              - children
              - giving
          example:
            - addressbook
            - bookings
        visible_to:
          $ref: '#/components/schemas/Tag/properties/visible_to'
        status:
          description: The current status of the Flow.
          type: string
          example: active
          enum:
            - active
            - archived
        archived_at:
          description: Date and time the Flow was archived.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_at:
          description: Date and time the Flow was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user that created the Flow.
          type: string
          example: jennie
          nullable: true
        modified_at:
          description: Date and time the Flow was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user that last modified the Flow.
          type: string
          example: caroline
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - notification_days
        - visible_in
        - visible_to
        - status
        - archived_at
        - created_at
        - created_by
        - modified_at
        - modified_by
    FlowStage:
      type: object
      properties:
        id:
          description: The Stage's ID.
          type: integer
          example: 1
          minimum: 1
        flow_id:
          description: The Flow ID the Stage belongs to.
          type: integer
          example: 1
          minimum: 1
        name:
          description: The Stage's name.
          type: string
          example: Welcome Call
          maxLength: 50
          minLength: 1
        instructions:
          description: The instructions for the Stage.
          type: string
          example: >-
            Give them a call, see how they found the service and if they have
            any questions or would like to meet.
          maxLength: 65535
          minLength: 0
        due_interval:
          description: >-
            The number of days, weeks or months used for tracking a person
            linked to the Stage, either relative to when they are first added to
            the flow or when they are processed from a previous stage.
          type: integer
          example: 35
          minimum: 0
        due_period:
          description: >-
            The due period used for tracking a person linked to the Stage,
            either relative to when they are first added to the flow or when
            they are processed from a previous stage.
          type: string
          example: days
          enum:
            - days
            - weeks
            - months
        due_from:
          description: >-
            The relative point used for tracking a person linked to the Stage,
            either when they are first added to the flow or when they are
            processed from a previous stage.
          type: string
          example: first_added
          enum:
            - first_added
            - previous_stage
        assigned_user_id:
          description: >-
            The ID of the user automatically assigned to people in this stage or
            null if no user is assigned.
          type: integer
          example: 15
          minimum: 1
          nullable: true
        automate_time:
          description: >-
            The UTC time the Stage will automatically process any due or overdue
            people if it is automated, or null if it is not automated.
          type: string
          format: time
          example: 09:30:00Z
          nullable: true
          pattern: ^([01]\d|2[0-3]):(00|15|30|45):00Z$
        order:
          description: The order the Stage appears.
          type: integer
          example: 1
          minimum: 1
        created_at:
          description: Date and time the Stage was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user that created the Stage.
          type: string
          example: abraham
          maxLength: 25
          minLength: 1
          nullable: true
        modified_at:
          description: Date and time the Stage was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user that last modified the Stage.
          type: string
          example: zoe
          maxLength: 25
          minLength: 1
          nullable: true
      additionalProperties: false
      required:
        - id
        - flow_id
        - name
        - instructions
        - due_interval
        - due_period
        - due_from
        - assigned_user_id
        - automate_time
        - order
        - created_at
        - created_by
        - modified_at
        - modified_by
