          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.read
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.read
      tags:
        - Contacts
    post:
      operationId: create_contact_note
      summary: Create a contact note
      description: Create a Note against a Contact in the Address Book module.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteAdd'
      responses:
        '201':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Note'
                additionalProperties: false
                required:
                  - data
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.write
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.write
      tags:
        - Contacts
  /addressbook/contacts:
    get:
      operationId: list_contacts
      summary: List contacts
      description: >-
        Returns a list of contacts, sorted alphabetically by last_name then
        first_name.
      parameters:
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPerPage'
        - name: status
          in: query
          description: Filter records by the provided status.
          schema:
            type: string
            example: active
            default: active
            enum:
              - active
              - archived
              - pending
        - name: q
          in: query
          description: >-
            Filter records with a fuzzy string match against the following
            properties: first_name, last_name, formal_name, email, telephone,
            mobile, address, job, employer.
          schema:
            description: A string to query by
            type: string
            example: mike
            minLength: 1
        - name: tag_ids[]
          in: query
          description: >-
            Filter records to those matching values in the provided array. This
            filter uses the logical OR operator.
          schema:
            type: array
            items:
              type: integer
              format: int32
              minimum: 1
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                additionalProperties: false
                required:
                  - data
                  - pagination
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.read
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.read
      tags:
        - Contacts
    post:
      operationId: create_contact
      summary: Create a contact
      description: Create a contact with the provided settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactAdd'
      responses:
        '201':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Contact'
                additionalProperties: false
                required:
                  - data
          links:
            EditContactByID:
              operationId: edit_contact
              parameters:
                id: $response.body#/data/id
            GetContactByID:
              operationId: get_contact
              parameters:
                id: $response.body#/data/id
            DeleteContactByID:
              operationId: delete_contact
              parameters:
                id: $response.body#/data/id
            CreateContactNote:
              operationId: create_contact_note
              parameters:
                id: $response.body#/data/id
            CreateContactKeyDateResource:
              operationId: create_contact_key_date_resource
              requestBody:
                resource:
                  id: $response.body#/data/id
            CreateContactTagResource:
              operationId: create_addressbook_tag_resource
              requestBody:
                person:
                  id: $response.body#/data/id
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.write
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.write
      tags:
        - Contacts
