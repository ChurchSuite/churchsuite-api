    get:
      operationId: list_donations
      summary: List donations
      description: Returns a list of donations, sorted by the most recent first.
      parameters:
        - name: claim_ids[]
          in: query
          description: >-
            Filter records to those matching values in the provided array. This
            filter uses the logical OR operator.
          schema:
            type: array
            items:
              type: integer
              format: int32
              minimum: 1
        - name: fund_ids[]
          in: query
          description: >-
            Filter records to those matching values in the provided array. This
            filter uses the logical OR operator.
          schema:
            type: array
            items:
              type: integer
              format: int32
              minimum: 1
        - name: giver_ids[]
          in: query
          description: >-
            Filter records to those matching values in the provided array. This
            filter uses the logical OR operator.
          schema:
            type: array
            items:
              type: integer
              format: int32
              minimum: 1
        - name: pledge_ids[]
          in: query
          description: >-
            Filter records to those matching values in the provided array. This
            filter uses the logical OR operator.
          schema:
            type: array
            items:
              type: integer
              format: int32
              minimum: 1
        - name: before
          in: query
          description: Only include records before this date.
          schema:
            type: string
            format: date
            example: '2024-02-24'
        - name: after
          in: query
          description: Only include records after this date.
          schema:
            type: string
            format: date
            example: '2024-01-24'
        - name: giftaid_claimable
          in: query
          description: Filter records by the provided status.
          schema:
            type: boolean
            example: true
        - name: giftaid_claimed
          in: query
          description: Filter records by the provided status.
          schema:
            type: boolean
            example: true
        - name: q
          in: query
          description: >-
            Filter records with a fuzzy string match against the following
            properties: cheque_number, method, fund_name, giver_reference,
            giver_first_name, giver_last_name.
          schema:
            description: A URL encoded string.
            type: string
            example: Card
        - name: statuses[]
          in: query
          description: >-
            Filter records to those matching values in the provided array. This
            filter uses the logical OR operator.
          schema:
            type: array
            items:
              example: pending
              enum:
                - active
                - deleted
                - pending
                - refunded
              default: active
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPerPage'
      responses:
        '200':
          description: OK Success
