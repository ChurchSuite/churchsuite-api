        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.read
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.read
      tags:
        - Contacts
    delete:
      operationId: delete_contact
      summary: Delete a contact
      description: Delete a single contact identified by ID.
      responses:
        '204':
          description: Successfully deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.write
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.write
      tags:
        - Contacts
    put:
      operationId: edit_contact
      summary: Update a contact
      description: Update a single contact identified by ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactEdit'
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Contact'
                additionalProperties: false
                required:
                  - data
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - addressbook.write
        - oauth_app:
            - full_access
        - oauth_app:
            - addressbook.write
      tags:
        - Contacts
  /addressbook/contacts/{id}/notes:
    parameters:
      - name: id
        in: path
        description: ID of the Contact in question.
        required: true
        schema:
          type: integer
          format: int32
          example: 2161
          minimum: 1
    get:
      operationId: list_contact_notes
      summary: List contact notes
      description: Returns a list of contact notes, sorted by pinned, created_at.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                additionalProperties: false
                required:
                  - data
