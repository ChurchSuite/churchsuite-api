    Ministry:
      description: A single Ministry from the Rotas module.
      type: object
      properties:
        id:
          description: The Ministry's ID.
          type: integer
          example: 109
          minimum: 1
        name:
          description: The Ministry's name.
          type: string
          example: Production
        description:
          description: The Ministry's description.
          type: string
          example: >-
            Whether working on the Stage, the Story, or the Stream, the
            Production Team help to create a great worship environment at Sunday
            gatherings.
        days:
          description: List of days the Ministry serves on.
          type: array
          items:
            type: string
            description: The day the Ministry meets at.
            example: wednesday
            enum:
              - monday
              - tuesday
              - wednesday
              - thursday
              - friday
              - saturday
              - sunday
          example:
            - saturday
            - sunday
        starts_at:
          description: The time when the Ministry starts serving.
          type: string
          example: '09:30'
          pattern: ^([01]\d|2[0-3]):[0-5]\d$
        ends_at:
          description: The time when the Ministry finishes serving.
          type: string
          example: '10:30'
          pattern: ^([01]\d|2[0-3]):[0-5]\d$
        rota_type:
          description: The type of Rota and team rotation that should be used.
          type: string
          example: adhoc
          enum:
            - adhoc
            - serve13
            - simple
        rotation_type:
          description: >-
            How often an AdHoc or Simple Rotation Rota created for this Ministry
            should serve, or null for Serve13.
          type: string
          example: weekly
          enum:
            - weekly
            - fortnightly
            - three_weekly
            - four_weekly
            - monthly_first_week
            - monthly_second_week
            - monthly_third_week
            - monthly_fourth_week
          nullable: true
        status:
          description: The status of the Ministry.
          type: string
          example: active
          enum:
            - active
            - archived
        image:
          description: A collection of different sized variations of an Image.
          type: object
          additionalProperties: false
          nullable: true
          properties:
            thumbnail:
              description: The thumbnail Image url. Thumbnail images are 128x128px.
              type: string
              format: url
              example: >-
                https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_thumb.jpg
            small:
              description: The small resolution Image url
              type: string
              format: url
              example: https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_sm.jpg
            medium:
              description: The medium resolution Image url
              type: string
              format: url
              example: https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_md.jpg
            large:
              description: The large resolution Image url
              type: string
              format: url
              example: https://cdn.churchsuite.com/abcdefgh/smallgroups/groups/x_lg.jpg
            uploaded_at:
              description: Date and time the Image was uploaded at.
              type: string
              format: date-time
              example: '2014-04-25T10:10:32Z'
              nullable: true
          required:
            - thumbnail
            - small
            - medium
            - large
            - uploaded_at
        site_ids:
          description: The Ministry's site ID returned in a single item array.
          type: array
          items:
            type: integer
          example:
            - 1
          maxItems: 1
          minItems: 1
        archived_at:
          description: Date and time an archived Ministry was archived.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_at:
          description: Date and time the Ministry was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
        created_by:
          description: The user who created the Ministry.
          type: string
          example: neil
        modified_at:
          description: Date and time the Ministry was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
        modified_by:
          description: The user who last modified the Ministry.
          type: string
          example: anthony
      additionalProperties: false
      required:
