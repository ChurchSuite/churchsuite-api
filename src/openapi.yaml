              type: string
              example: Floor 2
            line_2:
              description: The second line of the Address
              type: string
              example: 1 Broadway
            line_3:
              description: The third line of the Address
              type: string
              example: Lace Market
              nullable: true
            city:
              description: The city of the Address
              type: string
