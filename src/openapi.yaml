  /account/info:
    get:
      operationId: get_account_info
      summary: Get a summary of public account details
      description: >-
        Retrieve a summary of the public details about your account, that
        excludes information like the personal contact details of your billing,
        account and data protection contacts.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Info'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - account
        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Profile
  /account/integrations/stripe/accounts:
    get:
      operationId: list_stripe_accounts
      summary: List Stripe integration accounts
      description: Returns a list of integrated Stripe accounts.
      responses:
        '200':
          description: OK Success
          content:
