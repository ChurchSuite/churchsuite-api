            - Courier New
            - Georgia
            - Helvetica
            - Montserrat
            - Open Sans
            - Roboto
            - Tahoma
            - Terminal
            - Times New Roman
            - Trebuchet MS
            - Verdana
        email_footer:
          description: The Brand's html for email footers.
          type: string
          example: >-
            <span style="color: #4697c9; font-size: 8pt;"><a style="color:
