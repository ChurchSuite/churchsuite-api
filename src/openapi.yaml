          maxLength: 50
          minLength: 1
          pattern: ^[a-zA-Z]+$
        category_id:
          description: >-
            The Tag's Category ID. This sets the default colour of the Tag to
            the Category's colour.
          type: integer
          examples:
            - 1
            - 7
            - 12
          minimum: 1
        description:
          description: The description of the Tag.
          type: string
          example: The Kings Hope staff team (paid and unpaid).
          maxLength: 65535
          minLength: 0
        colour:
          description: >-
            The name of the colour of the Tag. If not specified, the Category
            colour will be used where applicable, falling back to 'blue'.
          type: string
          example: blue
          default: blue
          enum:
            - blue
            - red
            - orange
            - green
            - purple
            - pink
            - brown
            - grey
        is_smart:
          description: Whether the Tag is smart or fixed.
          type: boolean
          example: true
        visible_to:
          oneOf:
            - type: object
              description: >-
                Who the resource is visible to. Do not include in the request if
                there are no restrictions. If included in the request, only one
                of `just_me` or `user_group_ids` can be set.
              properties:
                just_me:
                  description: The resource should only be visible to the current user
                  type: boolean
                  example: true
                  enum:
                    - true
              additionalProperties: false
            - type: object
              description: >-
                Who the resource is visible to, or null if there are no
                restrictions.
              properties:
                user_group_ids:
                  description: >-
                    List of user group IDs the resource is visible to. You are
                    only able to add user group IDs for user groups you have
                    access to.
                  type: array
                  items:
                    type: integer
                    minimum: 1
                  example:
                    - 13
                    - 31
              additionalProperties: false
        pinned_icon:
          description: >-
            Pin this Tag by specifying an icon. Pinned tags give you a quick way
            to see your most important tags at a glance; they're displayed at
            the top of the page when viewing a person's profile.
          type: string
          example: tick
          enum:
            - tick
            - cross
            - archive
            - warning
            - flag
            - magic
            - star
            - profile
            - user
            - couple
            - group
            - pledge
            - education
            - job
            - gift
            - role
            - duration
            - smiley-happy
            - smiley-neutral
            - smiley-sad
      additionalProperties: false
      required:
        - name
        - is_smart
