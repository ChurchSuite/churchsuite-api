        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Sites
  /account/sites:
    get:
      operationId: list_sites
      summary: List sites
      description: Returns a list of sites, sorted by the order property.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
