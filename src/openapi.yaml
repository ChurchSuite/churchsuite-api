                          format: uuid
                          example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                          maxLength: 36
                          minLength: 36
                      required:
                        - id
                      additionalProperties: false
            required:
              - id
              - value
              - field_type
            additionalProperties: false
