openapi: 3.0.3
info:
  version: 2.88.0
  title: ChurchSuite API - v2
  description: >-
    Access data from your ChurchSuite account over RESTful endpoints, returning
    JSON responses.
  termsOfService: https://churchsuite.com/terms-of-service/
  contact:
    email: support@churchsuite.com
servers:
  - url: https://api.churchsuite.com/v2
    description: Public API server
paths:
  /account:
    get:
      operationId: get_account
      summary: Get account details
      description: Retrieve the details about your account.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - profile.read
        - oauth_app:
            - full_access
        - oauth_app:
            - profile.read
      tags:
        - Profile
  /account/brands/default:
    get:
      operationId: get_default_brand
      summary: Get default brand
      description: >-
        Retrieve the default brand, used in places where a specific brand has
        not been selected.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Brand'
                additionalProperties: false
                required:
                  - data
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - account
        - oauth_app:
            - full_access
        - oauth_app:
            - account
      tags:
        - Brands
  /account/brands/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the record to retrieve.
        required: true
        schema:
          type: integer
          format: int32
          example: 678
          minimum: 1
    get:
      operationId: get_brand
      summary: Get a brand
      description: Retrieve a single brand identified by ID.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Brand'
                additionalProperties: false
                required:
