          description: Custom Field responses for this resource
          type: array
          items:
            type: object
            description: Custom Field responses for this resource
            properties:
              id:
                description: The ID of the Custom Field
                type: integer
                example: 1
              field_type:
                description: >-
                  A discriminator to determine the type of Custom Field this
                  response belongs to.
                type: string
                example: text
                enum:
                  - checkbox
                  - date
                  - email
                  - phone
                  - radio
                  - select
                  - text
                  - textarea
              value:
                nullable: true
                oneOf:
                  - type: string
                    description: The raw value of a text, textarea, email, phone or date.
                    example: support@churchsuite.com
                  - type: object
                    description: >-
                      The UUID of the selected response for a radio or select
                      field.
                    example:
                      id: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                    properties:
                      id:
                        description: The UUID
                        type: string
                        format: uuid
                        example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                        maxLength: 36
                        minLength: 36
                    required:
                      - id
                    additionalProperties: false
                  - type: array
                    description: >-
                      An array of objects which contains the UUIDs of the
                      selected responses for a checkbox field. If no checkboxes
                      are selected an empty array will be returned.
                    items:
                      type: object
                      description: >-
                        The UUID of the selected response for a radio or select
                        field.
                      example:
                        id: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                      properties:
                        id:
                          description: The UUID
                          type: string
                          format: uuid
                          example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                          maxLength: 36
                          minLength: 36
                      required:
                        - id
                      additionalProperties: false
            required:
              - id
              - value
              - field_type
            additionalProperties: false
        links:
          description: External links for the Organisation.
          type: array
          items:
            type: string
          example:
