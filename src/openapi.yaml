          nullable: true
        modified_by:
          description: The user who last modified the Brand.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - default
        - emblem
        - logo
        - color
        - email_font
        - email_footer
        - created_at
        - created_by
        - modified_at
        - modified_by
