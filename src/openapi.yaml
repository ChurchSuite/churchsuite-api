          type: integer
          example: 12
          minimum: 1
        metric_id:
          description: The Metric ID the data belongs to.
          type: integer
          example: 12
          minimum: 1
        value:
          anyOf:
            - type: number
              format: float
              description: The number value of the Record Metric.
              example: 52.95
            - type: integer
              description: >-
                The currency value of the Record Metric, the amount in the
                smallest monetary unit of your account's currency.
              example: 1825
          nullable: true
      additionalProperties: false
      required:
        - record_id
        - metric_id
        - value
