    Donation:
      type: object
      properties:
        id:
          description: The Donation's ID.
          type: integer
          example: 12
          minimum: 1
        batch_id:
          description: >-
            The ID of the Batch the Donation is linked to, or null if it isn't
            linked one.
          type: integer
          example: 1226
          minimum: 1
          nullable: true
        giver_id:
          description: The ID of the Giver the Donation is linked to.
          type: integer
          example: 87
          minimum: 1
        fund_id:
          description: The ID of the Fund the Donation is linked to.
          type: integer
          example: 7
          minimum: 1
        pledge_id:
          description: >-
            The ID of the Pledge the Donation is linked to, or null if it isn't
            linked one.
          type: integer
          example: 87
          minimum: 1
          nullable: true
        claim_id:
          description: >-
            The ID of the Claim the Donation is linked to, or null if it isn't
            linked to one, or if the account is not in the UK.
          type: integer
          example: 365
          minimum: 1
          nullable: true
        date:
          description: The date of the Donation.
          type: string
          format: date
          example: '2021-01-01'
        amount:
          description: The Donation amount, in the smallest unit of the account currency.
          type: integer
          example: 3999
        method:
          description: >-
            The method through which the Donation was made. Value must be either
            system-defined or a user-defined value from the module settings.
          type: string
          example: bank
        cheque_number:
          description: >-
            When method is cheque, the cheque number associated with the
            Donation.
          type: integer
          example: 123456
          maxLength: 20
          nullable: true
        notes:
          description: The notes of the Donation.
          type: string
          example: Legacy gift
          nullable: true
        giftaid:
          description: >-
            The Gift Aid details of the Donation, or null if the account is not
            in the UK.
          type: object
          additionalProperties: false
          nullable: true
          properties:
            percentage_giver:
              description: >-
                The percentage of Gift Aid contribution for the Giver, or null
                if the Giver is not a couple.
              type: integer
              example: 20
              nullable: true
            percentage_spouse:
              description: >-
                The percentage of Gift Aid contribution for the Giver's spouse,
                or null if the Giver is not a couple.
              type: integer
              example: 80
              nullable: true
            claimable_amount:
              description: >-
                The amount of Gift Aid that is claimable for this Donation, in
                the smallest unit of the account currency, or null if the Giver
                does not have a declaration or overrode the declaration.
              type: integer
              example: 200
              nullable: true
            claimed_amount:
              description: >-
                The amount of Gift Aid that has been claimed for this Donation,
                in the smallest unit of the account currency, or null if the
                Donation has not had Gift Aid claimed on it.
              type: integer
              example: 200
              nullable: true
            refund_claim_id:
              description: >-
                The ID of the Claim the Donation's refunded Gift Aid has been
                processed in if the Gift Aid has been refunded, or null if the
                Gift Aid has not been refunded.
              type: integer
              example: 365
              nullable: true
            refund_amount:
              description: >-
                The amount of Gift Aid that has been refunded for this Donation,
                in the smallest unit of the account currency, or null if the
                Gift Aid has not been refunded.
              type: integer
              example: 200
              nullable: true
            overridden:
              description: >-
                Indicates when Gift Aid has been overridden for the Donation.
                When true, the Donation should not be subject to Gift Aid, even
                when a covering declaration exists.
              type: boolean
              example: false
          required:
            - percentage_giver
            - percentage_spouse
            - claimable_amount
            - claimed_amount
            - refund_claim_id
            - refund_amount
            - overridden
        tax_deductible:
          description: >-
            Whether the Donation is tax deductible. Null for accounts outside of
            AU, CA, HK and US.
          type: boolean
          example: true
          nullable: true
        gateway:
          description: >-
            For donations processed through a payment gateway, null if a payment
            gateway has not been used.
          type: object
          additionalProperties: false
          nullable: true
          properties:
            service:
              description: The payment gateway used for the Donation.
              type: string
              example: Stripe
            status:
              description: >-
                The last reported status for the Donation, as reported by the
                payment gateway.
              type: string
              example: paid
              nullable: true
            payout_id:
              description: >-
                The payment gateway's payout ID for the Donation, null if the
                Donation has not been paid out.
              type: string
              example: PO000019JL29J1
              nullable: true
            fees:
              description: >-
                The total amount of fees for the Donation, in the smallest unit
                of the account currency.
              type: integer
              example: 113
              nullable: true
            paid_out_at:
              description: >-
                Date and time the payment gateway reported the Donation was paid
                out.
              type: string
              format: date
              example: '2023-09-19'
              nullable: true
            modified_at:
              description: >-
                Date and time the payment gateway last reported a change to the
                Donation.
              type: string
              format: date-time
              example: '2023-09-19T14:52:40Z'
              nullable: true
          required:
            - service
            - status
            - payout_id
            - fees
            - paid_out_at
            - modified_at
        status:
          description: The current status of the Donation.
          type: string
          example: active
          enum:
            - active
            - deleted
            - pending
            - refunded
        created_at:
          description: Date and time the Donation was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created the Donation.
          type: string
          example: kelly
          nullable: true
        created_source:
          description: Where the Donation was created.
          type: string
          example: Donate
          nullable: true
        modified_at:
          description: Date and time the Donation was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified the Donation.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - batch_id
        - giver_id
        - fund_id
        - pledge_id
        - claim_id
        - date
        - amount
        - method
        - cheque_number
        - notes
        - giftaid
        - tax_deductible
        - gateway
        - status
        - created_at
        - created_by
        - created_source
        - modified_at
        - modified_by
    Fund:
      type: object
