        - status
        - created_at
        - created_by
        - modified_at
        - modified_by
    Record:
      description: >-
        A Record is the umbrella structure used to record attendance for a
        Gathering on a given date. Values for each of the Gathering's
        Metricset/Metrics are saved against the Record, and where People
        Tracking is enabled, each person's attendance can also be saved.
      type: object
      properties:
        id:
          description: The Record's ID.
          type: integer
          example: 12
          minimum: 1
        date:
          description: The Record's date.
          type: string
          format: date
          example: '2023-09-19'
        gathering_id:
          description: The Record's gathering ID.
          type: integer
          example: 12
          minimum: 1
        total_number:
          description: >-
            The aggregated total for this Record's number metrics, where the
            metric is configured to be included in the total.
          type: integer
          example: 12
        total_currency:
          description: >-
            The aggregated total for this Record's currency metrics, where the
            metric is configured to be included in the total, in the smallest
            monetary unit of your account's currency.
          type: integer
          example: 10029
        total_people:
          description: >-
            The total number of people Recorded as attending, available when
            People Tracking is enabled for the Gathering.
          type: integer
          example: 12
        notes:
          description: The Record's notes.
          type: string
          example: This is a note.
        created_at:
          description: Date and time the Record was created.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
        created_by:
          description: The user who created the Record.
          type: string
          example: anthony
        modified_at:
          description: Date and time the Record was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
        modified_by:
          description: The user who last modified the Record.
          type: string
          example: anthony
      additionalProperties: false
      required:
        - id
        - date
        - gathering_id
        - total_number
        - total_currency
        - total_people
        - notes
        - created_at
        - created_by
        - modified_at
        - modified_by
    RecordContact:
      description: >-
