                title: Text Field
                description: A Custom Field for this resource
                properties:
                  id:
                    description: The ID of the Custom Field
                    type: integer
                    example: 1
                    minimum: 1
                  field_type:
                    description: >-
                      A discriminator to determine the type of Custom Field this
                      response belongs to.
                    type: string
                    example: text
                    enum:
                      - text
                      - textarea
                      - phone
                      - date
                  value:
                    description: The raw value of a text, textarea, phone or date.
                    type: string
                    example: I like the songs.
                    minLength: 0
                required:
                  - id
                  - field_type
                  - value
                additionalProperties: false
              - type: object
                title: Email Field
                description: A Custom Field for this resource
                properties:
                  id:
                    description: The ID of the Custom Field
                    type: integer
                    example: 1
                    minimum: 1
                  field_type:
                    description: >-
                      A discriminator to determine the type of Custom Field this
                      response belongs to.
                    type: string
                    example: email
                    enum:
                      - email
