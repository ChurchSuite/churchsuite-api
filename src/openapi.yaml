    ParentCarerRelationship:
      description: >-
        A single Parent/Carer relationship of a Child from the Children's
        module.
      type: object
      properties:
        id:
          description: The relationship ID.
          type: integer
          example: 12
          minimum: 1
        child_id:
          description: The Child's ID the relationship is linked to.
          type: integer
          example: 148
          minimum: 1
        is_primary:
          description: >-
            Whether the relationship is a primary Parent/Carer relationship or
            not.
          type: boolean
          example: true
        relationship_type:
          description: The relationship between the Parent/Carer and the Child.
          type: string
          example: guardian
          enum:
            - aunt/uncle
            - foster parent
            - grandparent
            - guardian
            - other
            - parent
            - step-parent
        order:
          description: The order that the relationship appears in a list.
          type: integer
          example: 12
          minimum: 1
        parent_carer:
          description: A single Parent/Carer from the Children's module.
          type: object
          additionalProperties: false
          properties:
            first_name:
              description: Parent/Carer's first name.
              type: string
              example: Bart
            last_name:
              description: Parent/Carer's last name.
              type: string
              example: Simpson
            is_contact:
              description: Whether the Parent/Carer is a Contact or not.
              type: boolean
              example: true
            contact_id:
              description: >-
                The Parent/Carer's Contact ID if they are in the Address Book,
                or null if they are not.
              type: integer
              example: 78
              minimum: 1
              nullable: true
            mobile:
              description: Parent/Carer's mobile number.
              type: string
              example: 07700 900 258
            email:
              description: Parent/Carer's email address.
              type: string
              format: email
              example: bestgrandparent@parentcarers.com
              nullable: true
            telephone:
              description: Parent/Carer's telephone number.
              type: string
              example: 01632 960 000
            communication:
              description: The Parent/Carer's communication preferences.
              type: object
              additionalProperties: false
              properties:
                general_email:
                  description: >-
                    Whether this Parent/Carer has consented to receiving general
                    emails.
                  type: boolean
                  example: false
                general_sms:
                  description: >-
                    Whether this Parent/Carer has consented to receiving general
                    SMS messages.
                  type: boolean
                  example: true
                phone:
                  description: >-
                    Whether this Parent/Carer has consented to receiving phone
                    calls.
                  type: boolean
                  example: false
              required:
                - general_email
                - general_sms
                - phone
            status:
              description: >-
                Current status of the Parent/Carer, if the Parent/Carer is a
                Contact this will reflect their Contact status, for non-Contacts
                Parent/Carers this will always be active.
              type: string
              example: active
              default: active
              enum:
                - active
                - archived
                - pending
            created_at:
              description: Date and time the Parent/Carer's record was last created.
              type: string
              format: date-time
              example: '2023-09-19T14:52:40Z'
              nullable: true
            created_by:
              description: The user who last created the Parent/Carer's record.
              type: string
              example: anthony
              nullable: true
            created_source:
              description: >-
                The source of the Parent/Carer - for example, an import CSV
                filename.
              type: string
              example: neil
              nullable: true
            modified_at:
              description: Date and time the Parent/Carer's record was last modified.
              type: string
              format: date-time
              example: '2023-09-19T14:52:40Z'
              nullable: true
            modified_by:
              description: The user who last modified the Parent/Carer's record.
              type: string
              example: anthony
              nullable: true
          required:
            - first_name
            - last_name
            - is_contact
            - contact_id
            - mobile
            - email
            - telephone
            - communication
            - status
            - created_at
            - created_by
            - created_source
            - modified_at
            - modified_by
        created_at:
          description: Date and time the relationship's record was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created the relationship's record.
          type: string
          example: neil
          nullable: true
      additionalProperties: false
      required:
        - id
        - child_id
        - is_primary
        - relationship_type
        - order
