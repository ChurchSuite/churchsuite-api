        '429':
          $ref: '#/components/responses/429'
      security:
        - api_enabled_user:
            - full_access
        - api_enabled_user:
            - brands.read
        - oauth_app:
            - full_access
        - oauth_app:
            - brands.read
      tags:
        - Brands
  /account/brands:
    get:
      operationId: list_brands
      summary: List brands
      description: Returns a list of brands, sorted alphabetically by name.
      responses:
        '200':
          description: OK Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
