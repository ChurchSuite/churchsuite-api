      Internal Booking, External Booking, Wedding, etc.
    externalDocs:
      description: >-
        Explore our large database of online support articles for step-by-step
        help.
      url: >-
        https://support.churchsuite.com/article/122-creating-booking-types-and-resources
  - name: Categories
    description: >-
