    Group:
      description: A single Group from the Children's module.
      type: object
      properties:
        id:
          description: The ID of the Group.
          type: integer
          example: 1
          minimum: 1
        name:
          description: The name of the Group.
          type: string
          example: Impact
        group_setup_id:
          description: The ID of the Group Setup the Group belongs to.
          type: integer
          example: 5
          minimum: 1
        checkin_badges_child:
          description: The number of badges printed per child.
          type: integer
          example: 1
          maximum: 99
          minimum: 0
        checkin_badges_pickup:
          description: The number of pick-up badges printed per unique check-in code.
          type: integer
          example: 1
          maximum: 99
          minimum: 0
        checkin_badges_room:
          description: The number of room badges printed per Child.
          type: integer
          example: 1
          maximum: 99
          minimum: 0
        checkin_capacity:
          description: The maximum capacity of the Group.
          type: integer
          example: 6
          maximum: 999
          minimum: 0
          nullable: true
        checkin_ratio:
          description: The maximum number of children allowed per adult.
          type: integer
          example: 1
          maximum: 999
          minimum: 0
          nullable: true
        entry_age_years:
          description: The age of entry to the Group in years.
          type: integer
          example: 6
          minimum: 0
        entry_age_months:
          description: The age of entry to the Group in months.
          type: integer
          example: 4
          maximum: 11
          minimum: 0
        entry_month:
          description: >-
            The month the children are processed into the Group, or 0 if they
            process on their birthday.
          type: integer
          example: 9
          maximum: 12
          minimum: 0
        status:
          description: Current status of the Group.
          type: string
          example: active
          enum:
            - active
            - archived
        archived_at:
          description: Date and time the Groups was archived.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_at:
          description: Date and time the Group was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created the Group.
          type: string
          example: neil
          nullable: true
        modified_at:
          description: Date and time the Group was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified the Group.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - name
        - group_setup_id
        - checkin_badges_child
        - checkin_badges_pickup
        - checkin_badges_room
        - checkin_capacity
        - checkin_ratio
        - entry_age_years
        - entry_age_months
        - entry_month
        - status
        - archived_at
        - created_at
        - created_by
        - modified_at
        - modified_by
