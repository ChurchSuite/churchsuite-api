        category_id:
          description: The Tag's Category ID.
          type: integer
          examples:
            - 1
            - 7
            - 12
          minimum: 1
          nullable: true
        description:
          description: The description of the Tag.
          type: string
          example: The Kings Hope staff team (paid and unpaid).
          maxLength: 65535
          minLength: 0
        colour:
          description: The name of the colour of the Tag.
          type: string
          example: blue
          enum:
            - blue
            - red
            - orange
            - green
            - purple
            - pink
            - brown
            - grey
        visible_to:
          description: >-
            Who the resource is visible to. Null if there are no restrictions.
            If `just_me` is true, `user_group_ids` must be empty or not set. If
            `just_me` is false, `user_group_ids` must contain at least one User
            Group ID.
          type: object
          nullable: true
          oneOf:
            - type: object
              title: Visible to User Groups
              properties:
                just_me:
                  description: The resource should only be visible to the current user
                  type: boolean
                  example: false
                  enum:
                    - false
                user_group_ids:
                  description: List of user group IDs the resource is visible to.
                  type: array
                  items:
                    type: integer
                    minimum: 1
                  example:
                    - 13
                    - 31
              required:
                - user_group_ids
              additionalProperties: false
            - type: object
              title: Visible to just me
              properties:
                just_me:
                  description: The resource should only be visible to the current user
                  type: boolean
                  example: true
                  enum:
                    - true
                user_group_ids:
                  description: List of user group IDs the resource is visible to.
                  type: array
                  items:
                    type: integer
                  example: []
                  maxItems: 0
              required:
                - just_me
              additionalProperties: false
        pinned_icon:
          description: >-
            Pin this Tag by specifying an icon. This will be displayed within
            the application.
          type: string
          example: tick
          enum:
            - tick
            - cross
            - archive
            - warning
            - flag
            - magic
            - star
            - profile
            - user
            - couple
            - group
            - pledge
            - education
            - job
            - gift
            - role
            - duration
            - smiley-happy
            - smiley-neutral
            - smiley-sad
          nullable: true
      additionalProperties: false
      required:
        - name
        - category_id
        - description
        - colour
        - visible_to
        - pinned_icon
    TagResource:
