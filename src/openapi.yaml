            - days
            - weeks
            - months
        due_from:
          description: >-
            The relative point used for tracking a person linked to the Stage,
            either when they are first added to the flow or when they are
            processed from a previous stage.
          type: string
          example: first_added
          enum:
            - first_added
            - previous_stage
        assigned_user_id:
          description: >-
            The ID of the user automatically assigned to people in this stage,
            or null if no user is assigned.
          type: integer
          example: 33
          minimum: 1
          nullable: true
        automate_time:
          description: >-
            The UTC time the Stage will automatically process any due or overdue
            people if it is automated, or null if it is not automated.
          type: string
          format: time
          example: 09:30:00Z
          nullable: true
          pattern: ^([01]\d|2[0-3]):(00|15|30|45):00Z$
      additionalProperties: false
      required:
        - name
        - instructions
        - due_interval
        - due_period
        - due_from
        - assigned_user_id
        - automate_time
    FormField:
      description: A Form Field, as found in the AddressBook or Children modules
      type: object
      properties:
        id:
          description: The ID of the Form Field.
          type: integer
          example: 1
        order:
          description: Order the Form Field appears.
          type: integer
          example: 1
        type:
          description: The Form Field type.
          type: string
          example: text
          enum:
            - address
            - checkbox
            - dataProtection
            - date
            - deleted
            - details
            - divider
            - email
            - heading
            - name
            - phone
            - prose
            - radio
            - select
            - signature
            - text
            - textarea
        name:
          description: Name of the Form Field.
          type: string
          example: Walk home permission
        help:
          description: Some text to help explain the purpose of the field.
          type: string
          example: Select if your child is allowed to walk home alone or not.
          nullable: true
        options:
          description: >-
            Field types checkbox, radio or select - will contain options for the
            field
          type: array
          items:
            type: object
            properties:
              value:
                description: >-
                  Either the UUID of the option or the options raw value where
                  there is a non-uuid value for the option, for example the
                  person sex field.
                type: string
                example: f
              label:
                description: Name of the option.
                type: string
                example: >-
                  Yes I am happy for my child to walk home without a responsible
                  adult.
            required:
              - value
              - label
            additionalProperties: false
          nullable: true
        required:
          description: Whether the field is required or not.
          type: boolean
          example: true
        settings:
          description: Any additional settings relating to the Form Field.
          type: object
          nullable: true
          properties:
            confirmation:
              description: >-
                Whether confirmation will be sent to the provided email address
                on the forms submission or not.
              type: boolean
              example: false
              nullable: true
            required_fields:
              description: List of any required fields.
              type: array
              items:
                type: string
              example:
                - name
                - email
              nullable: true
            text:
              description: Text linked to a form element.
              type: string
              example: >-
                I agree to my son/daughter participating in youth club and the
                activities run by the team.
              nullable: true
          required:
            - confirmation
            - required_fields
            - text
        created_at:
          description: Date and time the Form Field was created.
          type: string
          format: date-time
          example: '2022-11-17T16:48:13Z'
          nullable: true
        created_by:
          description: The user who created the Form Field.
          type: string
          example: import
          nullable: true
        modified_at:
          description: Date and time the Form Field was last modified.
          type: string
          format: date-time
          example: '2022-11-17T16:48:13Z'
          nullable: true
        modified_by:
          description: The user who last modified the Form Field.
          type: string
          example: import
          nullable: true
      additionalProperties: false
      required:
        - id
        - order
        - type
        - name
        - help
        - options
        - required
        - settings
        - created_at
        - created_by
        - modified_at
        - modified_by
    FormResponse:
      type: object
      properties:
        id:
          description: The ID of the Response.
          type: integer
          example: 98
        form_id:
          description: The ID of the Form the Response is linked to.
          type: integer
          example: 12
        contact_ids:
          description: The IDs of Contacts the Response is linked to.
          type: array
          items:
            type: integer
            minimum: 1
          example:
            - 652
        child_ids:
          description: The IDs of Children the Response is linked to.
          type: array
          items:
            type: integer
            minimum: 1
          example:
            - 652
        invite_response:
          description: Whether the Response linked to a form invite or not.
          type: boolean
          example: true
        response_data:
          description: Form Field responses for this resource
          type: array
          items:
            type: object
            description: Form Field response for this resource
            properties:
              id:
                description: The ID of the Form Field
                type: integer
                example: 1
              value:
                nullable: true
                oneOf:
                  - type: string
                    description: >-
                      The raw value of a text, textarea, email, phone, date,
                      select, radio or signature url.
                    pattern: ^(?!\d{4}-\d{2}-\d{2}$).+$
                    example: support@churchsuite.com
                  - type: integer
                    description: The id of a site.
                    example: 1
                  - type: object
                    description: The first and last name response values of a name field.
                    properties:
                      first_name:
                        description: The first name field value.
                        type: string
                        example: Michelle
                      last_name:
                        description: The last name field value.
                        type: string
                        example: Hawks
                    required:
                      - first_name
                      - last_name
                    additionalProperties: false
                  - type: object
                    description: The details fields response values.
                    properties:
                      first_name:
                        description: The first name field value.
                        type: string
                        example: Michelle
                      last_name:
                        description: The last name field value.
                        type: string
                        example: Hawks
                      email:
                        description: The email field value.
                        type: string
                        example: mhawks@churchsuite.com
                      mobile:
                        description: The email field value.
                        type: string
                        example: 07700 900000
                      telephone:
                        description: The email field value.
                        type: string
                        example: 2079460197
                    required:
                      - last_name
                      - first_name
                      - email
                      - mobile
                      - telephone
                    additionalProperties: false
                  - type: object
                    description: The values of an address field.
                    properties:
                      line_1:
                        description: The first line of the address.
                        type: string
                        example: ChurchSuite
                        nullable: true
                      line_2:
                        description: The second line of the address.
                        type: string
                        example: 2nd Floor The Courtyard
                        nullable: true
                      line_3:
                        description: The third line of the address.
                        type: string
                        example: 35-37 St Mary's Gate
                        nullable: true
                      city:
                        description: The city of the address.
                        type: string
                        example: Nottingham
                        nullable: true
                      county:
                        description: The county of the address.
                        type: string
                        example: Nottinghamshire
                        nullable: true
                      country:
                        description: The country of the address, in ISO3166 alpha 2 format.
                        type: string
                        example: GB
                        nullable: true
                      postcode:
                        description: The post code of the address.
                        type: string
                        example: NG1 1PU
                        nullable: true
                    required:
                      - line_1
                      - line_2
                      - line_3
                      - city
                      - county
                      - country
                      - postcode
                    additionalProperties: false
                  - type: array
                    description: >-
                      An array of objects which contains the UUIDs of the
                      selected responses for a checkbox field. If no checkboxes
                      are selected an empty array will be returned.
                    items:
                      type: object
                      description: >-
                        The UUID of the selected response for a radio or select
                        field.
                      example:
                        id: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                      properties:
                        id:
                          description: The UUID
                          type: string
                          format: uuid
                          example: ffbfc9fd-4579-4370-9783-2e4390cd0e30
                          maxLength: 36
                          minLength: 36
                      required:
                        - id
                      additionalProperties: false
                  - type: array
                    description: An array of selected responses for a communications field.
                    example:
                      - post
                      - rota_sms
                      - general_sms
                    items:
                      type: string
                      enum:
                        - general_email
                        - general_sms
                        - rota_email
                        - rota_sms
                        - phone
                        - post
                  - type: array
                    description: An array of selected responses for a privacy field.
                    example:
                      - address
                      - mobile
                    items:
                      type: string
                      enum:
                        - address
                        - telephone
                        - mobile
                        - email
                  - type: string
                    format: date
                    description: The value for a date field.
                    example: '2022-11-17'
                    nullable: true
                  - type: array
                    description: >-
                      An array of selected responses for a photo/video consent
                      field.
                    example:
                      - internal
                      - external
                    items:
                      type: string
                      enum:
                        - internal
                        - external
            required:
              - id
              - value
            additionalProperties: false
        status:
          description: The status of the Response.
          type: string
          example: active
          enum:
            - active
            - archived
            - spam
        created_at:
          description: Date and time the Response was created.
          type: string
          format: date-time
          example: '2014-04-25T10:10:32Z'
          nullable: true
        created_by:
          description: The user who created the Response.
          type: string
          example: neil
          nullable: true
        modified_at:
          description: Date and time the Response details was last modified.
          type: string
          format: date-time
          example: '2023-09-19T14:52:40Z'
          nullable: true
        modified_by:
          description: The user who last modified the Response details.
          type: string
          example: anthony
          nullable: true
      additionalProperties: false
      required:
        - id
        - form_id
        - contact_ids
        - child_ids
        - invite_response
        - response_data
        - status
        - created_at
        - created_by
        - modified_at
        - modified_by
